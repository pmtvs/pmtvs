name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build wheels for Rust-backed packages
  build-rust-wheels:
    strategy:
      matrix:
        package:
          - pmtvs-entropy
          - pmtvs-fractal
          - pmtvs-statistics
          - pmtvs-correlation
          - pmtvs-distance
          - pmtvs-embedding
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python${{ matrix.python-version }}
          manylinux: auto
          working-directory: packages/${{ matrix.package }}

      - name: Build wheels (Linux ARM)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist -i python${{ matrix.python-version }}
          manylinux: auto
          working-directory: packages/${{ matrix.package }}

      - name: Build wheels (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python${{ matrix.python-version }}
          working-directory: packages/${{ matrix.package }}

      - name: Build wheels (macOS ARM)
        if: matrix.os == 'macos-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --out dist -i python${{ matrix.python-version }}
          working-directory: packages/${{ matrix.package }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.os }}-py${{ matrix.python-version }}
          path: packages/${{ matrix.package }}/dist/*.whl

  # Build source distributions for Rust packages
  build-rust-sdist:
    strategy:
      matrix:
        package:
          - pmtvs-entropy
          - pmtvs-fractal
          - pmtvs-statistics
          - pmtvs-correlation
          - pmtvs-distance
          - pmtvs-embedding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: packages/${{ matrix.package }}

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/*.tar.gz

  # Build pure Python packages
  build-python-packages:
    strategy:
      matrix:
        package:
          - pmtvs
          - pmtvs-dynamics
          - pmtvs-spectral
          - pmtvs-matrix
          - pmtvs-topology
          - pmtvs-network
          - pmtvs-information
          - pmtvs-tests
          - pmtvs-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build
        working-directory: packages/${{ matrix.package }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/*

  # Publish all packages to PyPI
  publish:
    needs: [build-rust-wheels, build-rust-sdist, build-python-packages]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
