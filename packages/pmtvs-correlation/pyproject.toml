[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "pmtvs-correlation"
version = "0.3.3"
description = "Correlation primitives: autocorrelation, cross-correlation, coherence"
license = {text = "PolyForm-Strict-1.0.0"}
license-files = []
authors = [{name = "pmtvs contributors"}]
requires-python = ">=3.9"
dependencies = ["numpy>=1.21"]

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "pmtvs_correlation._rust"
