[package]
name = "pmtvs_embedding"
version = "0.1.0"
edition = "2021"

[lib]
name = "_rust"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module"] }
numpy = "0.21"
ndarray = "0.16"
pmtvs_shared = { path = "../../shared" }

[profile.release]
opt-level = 3
lto = true
