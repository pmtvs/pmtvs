[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "pmtvs-statistics"
version = "0.1.0"
description = "Signal statistics and calculus primitives"
license = { text = "MIT" }
authors = [{ name = "Jason Rudder" }, { name = "Avery Rudder" }]
requires-python = ">=3.9"
dependencies = ["numpy>=1.21"]

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "pmtvs_statistics._rust"
