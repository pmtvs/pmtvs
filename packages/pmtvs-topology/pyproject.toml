[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pmtvs-topology"
version = "0.1.0"
description = "Topological data analysis primitives"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Jason Rudder"}, {name = "Avery Rudder"}]
requires-python = ">=3.9"
dependencies = ["numpy>=1.20"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["python"]

[tool.pytest.ini_options]
testpaths = ["tests"]
