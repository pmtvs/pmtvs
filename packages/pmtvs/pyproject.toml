[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pmtvs"
version = "0.1.0"
description = "Rust-accelerated signal analysis primitives"
license = { text = "MIT" }
authors = [{ name = "Jason Rudder" }, { name = "Avery Rudder" }]
requires-python = ">=3.9"
dependencies = [
    "pmtvs-entropy>=0.1.0",
    "pmtvs-fractal>=0.1.0",
    "pmtvs-statistics>=0.1.0",
    "pmtvs-correlation>=0.1.0",
    "pmtvs-distance>=0.1.0",
    "pmtvs-embedding>=0.1.0",
    "pmtvs-dynamics>=0.1.0",
    "pmtvs-spectral>=0.1.0",
    "pmtvs-matrix>=0.1.0",
    "pmtvs-topology>=0.1.0",
    "pmtvs-network>=0.1.0",
    "pmtvs-information>=0.1.0",
    "pmtvs-tests>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["python"]
